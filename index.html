<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Viaje Hacia Ti</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            overflow: hidden; 
            background-color: #000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #fff;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        #webgl-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Canvas para los fuegos artificiales */
        #fireworks-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 15; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* --- PANTALLA DE INICIO --- */
        #intro-screen {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 20;
            transition: opacity 1s ease-out;
        }

        .intro-title {
            font-size: 4.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #fff, #d4af37, #ff6b6b, #fff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease infinite, floatText 3s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
            margin-bottom: 20px;
        }

        .intro-note {
            font-size: 1.2rem;
            color: #e2e8f0;
            font-style: italic;
            letter-spacing: 2px;
            opacity: 0.8;
            animation: fadeInOut 4s infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; text-shadow: none; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); }
        }

        /* --- PANEL DE TEXTO (Glassmorphism) --- */
        .text-panel {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            max-height: 45vh;
            overflow-y: auto;
            background: linear-gradient(135deg, rgba(15, 15, 25, 0.8), rgba(5, 5, 10, 0.6));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            padding: 35px 40px;
            border-radius: 20px;
            text-align: center;
            opacity: 0; 
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            scrollbar-width: thin;
            scrollbar-color: rgba(212, 175, 55, 0.5) transparent;
        }

        .text-panel::-webkit-scrollbar { width: 6px; }
        .text-panel::-webkit-scrollbar-track { background: transparent; }
        .text-panel::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 10px; }

        .text-panel::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.05), transparent);
            transform: rotate(30deg);
            animation: scanLight 6s infinite linear;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes scanLight {
            0% { transform: translateY(-100%) rotate(30deg); }
            100% { transform: translateY(100%) rotate(30deg); }
        }

        h1.stage-heading {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #d4af37, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            min-height: 1.2em; 
        }

        p.dedication {
            font-size: 1.3rem;
            line-height: 1.7;
            color: #e2e8f0;
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .animated-word {
            display: inline-block;
            opacity: 0;
            transform: translateY(15px) scale(0.9);
            filter: blur(8px);
            animation: wordReveal 0.6s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
        }

        @keyframes wordReveal {
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        #controls-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: auto;
            z-index: 25;
        }

        button {
            background: rgba(20, 20, 25, 0.8);
            border: 2px solid rgba(212, 175, 55, 0.6);
            color: white;
            padding: 16px 45px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        /* Botón brillante y pulsante (Inicio) */
        .btn-glow {
            animation: pulseBtn 2s infinite ease-in-out;
            border-color: rgba(212, 175, 55, 1);
        }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.9), inset 0 0 10px rgba(212, 175, 55, 0.4); transform: scale(1.05); }
            100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.3); transform: scale(1); }
        }

        button:hover {
            background: rgba(212, 175, 55, 0.25);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.8);
        }

        button:hover::before {
            left: 100%;
        }

        .helper-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: none; /* Se oculta hasta salir del inicio */
            animation: pulseText 2.5s infinite;
        }

        @keyframes pulseText {
            0% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
            100% { opacity: 0.4; }
        }

        /* --- SISTEMA DUAL: FOTO COMPLETA A CORAZÓN --- */
        #final-photo-container {
            position: absolute;
            top: 55%; 
            left: 50%;
            width: 420px; height: 420px; 
            transform: translate(-50%, 0) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .photo-full, .photo-heart {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .photo-full {
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .photo-heart {
            opacity: 0;
            transform: scale(1.15); 
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            -webkit-mask-size: contain;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            mask-size: contain;
            mask-position: center;
            mask-repeat: no-repeat;
            filter: drop-shadow(0 0 35px rgba(255, 50, 100, 0.9)) drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
        }

        #final-photo-container.show-full {
            opacity: 1;
            transform: translate(-50%, 0) scale(1); 
        }

        #final-photo-container.morph-to-heart .photo-full {
            opacity: 0;
            transform: scale(0.85); 
        }

        #final-photo-container.morph-to-heart .photo-heart {
            opacity: 1;
            transform: scale(1);
            animation: heartbeat 2s infinite ease-in-out 1.5s; 
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            10% { transform: scale(1.08); filter: drop-shadow(0 0 50px rgba(255, 50, 100, 1)); }
            20% { transform: scale(1); }
            30% { transform: scale(1.08); filter: drop-shadow(0 0 50px rgba(255, 50, 100, 1)); }
            50% { transform: scale(1); filter: drop-shadow(0 0 35px rgba(255, 50, 100, 0.9)); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .intro-title { font-size: 2.8rem; }
            .intro-note { font-size: 1rem; }
            .text-panel { padding: 20px; top: 3vh; max-height: 48vh; }
            h1.stage-heading { font-size: 1.8rem; margin-bottom: 10px; }
            p.dedication { font-size: 1.05rem; }
            #final-photo-container { width: 85vw; height: 85vw; top: 53%; }
            button { padding: 14px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <audio id="background-audio" loop>
        <source src="./assets/cancion.mp3" type="audio/mpeg">
    </audio>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    
    <canvas id="webgl-canvas"></canvas>
    <canvas id="fireworks-canvas"></canvas>

    <div id="ui-layer">
        <div id="intro-screen">
            <h1 class="intro-title">Mi Viaje Hacia Ti</h1>
            <p class="intro-note">Lee bien las descripciones de los planetas.</p>
        </div>

        <div class="text-panel" id="text-panel">
            <h1 class="stage-heading" id="stage-title"></h1>
            <p class="dedication" id="stage-desc"></p>
        </div>
        
        <div id="controls-container">
            <p class="helper-text" id="helper-text">👆 Arrastra para explorar en 360° | Pellizca para Zoom</p>
            <button id="next-btn" class="btn-glow">Iniciar Viaje</button>
        </div>
    </div>

    <div id="final-photo-container">
        <img class="photo-full" src="./assets/yo.jpg" alt="Nosotros">
        <img class="photo-heart" src="./assets/yo.jpg" alt="Nosotros Corazón">
    </div>
    
    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. CONFIGURACIÓN DEL VIAJE (Orden exacto y Descripciones Originales)
    const journeyStages = [
        { id: 'orion', name: 'Constelación de Orión', desc: 'En el cielo invernal, Orión es el cazador, una de las constelaciones más brillantes. Así como sus estrellas en el cinturón han guiado a los navegantes durante milenios, tú te has convertido en mi brújula en este inmenso universo. Desde que te encontré, me guías con tu luz. Ya no divago sin rumbo, porque ahora todas mis estrellas y todos mis pasos me llevan directamente hacia ti.', texture: './assets/orion.jpg', size: 8, isEmissive: true, isMap: true },
        { id: 'ursa_major', name: 'La Osa Mayor', desc: 'La Osa Mayor es legendaria porque siempre nos ayuda a encontrar la Estrella Polar, ese punto fijo y seguro que nunca cambia en el firmamento. En medio del caos y de los giros inesperados de la vida, tú eres esa constante para mí. Eres mi norte, mi punto de referencia. No importa cuán oscuro se ponga el cielo a veces, sé que siempre puedo mirar hacia ti para encontrar el camino a casa.', texture: './assets/osa.jpg', size: 8, isEmissive: true, isMap: true },
        { id: 'halley', name: 'Cometa Halley', desc: 'Los cometas son viajeros errantes, y su paso por el firmamento es un evento raro, fugaz y espectacular. Como el Cometa Halley, tu llegada a mi vida fue algo extraordinario, un destello que iluminó y cambió mi panorama por completo. Pero a diferencia de los cometas que siempre se van, tú decidiste detener tu vuelo y quedarte a mi lado, dejando una estela brillante y permanente en mi corazón.', texture: './assets/cometa.jpg', size: 4, isMap: true },
        { id: 'neptune', name: 'Neptuno', desc: 'Como el reino de Poseidón, mi superficie puede parecer fría, distante y cubierta de un hielo inabarcable. Quizás a veces me veas así, perdido en los confines. Pero que no te engañe mi frialdad: en las profundidades de este gigante azul late una lealtad absoluta. Soy tu guardián; si el mundo entero intentara alcanzarte, sería el muro infranqueable que te protegería hasta en el último rincón del cosmos', texture: './assets/2k_neptune.jpg', size: 5 },
        { id: 'uranus', name: 'Urano', desc: 'En la mitología, Urano es el padre del cielo, el origen de todo. Este planeta es único porque gira de lado, como si desafiara las leyes naturales para rodar por el cosmos. Es la analogía perfecta para lo que siento: desde que llegaste, mi mundo cambió totalmente de eje. Me sacaste de mi rutina predecible para hacerme rodar en una dirección nueva, una que disfruto mucho más solo por seguirte a ti.', texture: './assets/2k_uranus.jpg', size: 5 },
        { id: 'saturn', name: 'Saturno', desc: 'Saturno es el dominio de Cronos, el dios del tiempo. Sus anillos perfectos son un símbolo eterno de equilibrio, y eso es exactamente lo que siento contigo: cada segundo que compartimos se detiene y se transforma en algo valioso. Desde que llegaste, el tiempo dejó de ser solo horas que pasan en el reloj; ahora, cada momento juntos vale oro y ha convertido estos dos meses en una verdadera etapa dorada', texture: './assets/8k_saturn.jpg', size: 6, hasRing: true, ringTexture: './assets/8k_saturn_ring_alpha.png' },
        { id: 'jupiter', name: 'Júpiter', desc: 'Júpiter es el trono de Zeus, el rey que mantiene el equilibrio en el cosmos. Más allá de su inmensidad, este gigante actúa como un escudo protector frente a cualquier amenaza. Así mismo eres tú para mí: cuando el día se pone difícil, tu presencia me devuelve la calma y la estabilidad que necesito. Y quiero que esto sea mutuo; cuenta conmigo siempre, quiero ser tu escudo, tu lugar seguro y ese apoyo constante que esté ahí para cuidarte frente a cualquier tormenta', texture: './assets/8k_jupiter.jpg', size: 7 },
        { id: 'mars', name: 'Marte', desc: 'Marte es el dominio de Ares, el dios que representa la pasión, la fuerza y el fuego incontrolable. Su superficie roja es pura intensidad, tal como tú. Estar contigo es mi aventura favorita; me sacas de mi zona de confort y me invitas a explorar lo desconocido con una alegría y un cariño que no conocía. Gracias por ser tan expresiva y por contagiarme esa energía; contigo, afrontar lo nuevo se siente emocionante en lugar de difícil', texture: './assets/8k_mars.jpg', size: 3.5 },
        { id: 'sun', name: 'El Sol', desc: 'En la mitología, el Sol es el dominio de Helios, el portador de la luz que ahuyenta cualquier sombra. Llegamos al centro de todo el viaje, y te has convertido en eso para mí: una luz que ilumina mis días de una forma que no esperaba. En estos dos meses, me has enseñado que la vida es mucho más brillante cuando se comparte con alguien como tú. Eres el centro de mi energía y la razón por la que siempre tengo una sonrisa cuando pienso en lo que estamos construyendo', texture: './assets/8k_sun.jpg', size: 10, isEmissive: true },
        { id: 'venus', name: 'Venus', desc: 'Venus lleva el nombre de la diosa del amor y la belleza, y no encuentro mejor forma de describirte. Eres mi musa, mi propia diosa que llegó para darle color a mi rutina. Gracias por ser mi luz más brillante incluso en las noches más oscuras; tu presencia me da una calma y una alegría que realmente no sabía que necesitaba hasta que te encontré.', texture: './assets/4k_venus_atmosphere.jpg', size: 4 },
        { id: 'mercury', name: 'Mercurio', desc: 'Mercurio es el mensajero de los dioses, el planeta que viaja a mayor velocidad por el cielo. Nuestro encuentro tuvo esa misma magia: fue algo fugaz y veloz, como si el destino te hubiera enviado directamente a mi camino. Llegaste un día y, afortunadamente, decidiste quedarte. Esa rapidez con la que entraste en mi vida fue la mejor sorpresa, y hoy agradezco que nunca te hayas ido', texture: './assets/8k_mercury.jpg', size: 2.5 },
        { id: 'moon', name: 'La Luna', desc: 'Al igual que la Luna orbita la Tierra, tú has estado siempre presente, acompañándome incluso en los días más brillantes. Pero es en las noches más oscuras donde tu luz brilla con más intensidad y me reconforta. Gracias por cuidar y velar mis sueños durante estos dos meses; mi mayor deseo es que sigamos compartiendo muchos meses más caminando juntos bajo tu compañía', texture: './assets/8k_moon.jpg', size: 2 },
        { id: 'earth', name: 'La Tierra', desc: 'La Tierra es nuestro único hogar y transporte en este vasto universo; es el suelo firme que nos permite seguir avanzando juntos. Así como el cosmos no tiene límites, espero que lo nuestro sea igual. Valoro profundamente nuestro comienzo hace dos meses, pero mi mayor deseo es que tengamos siempre presente ese punto de partida y que nunca, jamás, encontremos el final del viaje.', texture: './assets/8k_earth_daymap.jpg', size: 4.5 },
        { id: 'south_america', name: 'América del Sur', desc: 'Descendiendo a nuestro rincón del mundo. Un continente inmenso y lleno de vida, pero para mí, su mayor tesoro es que es el lugar exacto donde tú y yo coincidimos en el espacio y el tiempo.', texture: './assets/america.jpg', size: 4, isMap: true },
        { id: 'venezuela', name: 'Venezuela', desc: 'Nuestro país. Bajo este mismo cielo compartimos nuestras primeras alegrías. De todas las coordenadas posibles del universo, el destino nos puso precisamente aquí para encontrarnos.', texture: './assets/venezuela.jpg', size: 4, isMap: true },
        { id: 'aragua', name: 'Estado Aragua', desc: 'Acercándonos más. El estado que alberga nuestros pasos, el escenario perfecto, cálido y vibrante donde nuestra historia comenzó a escribirse.', texture: './assets/aragua.jpg', size: 4, isMap: true },
        { id: 'girardot', name: 'Municipio Girardot', desc: 'Nuestro punto de encuentro exacto. Aquí, entre lo cotidiano y lo mágico de nuestros días, es donde nuestra aventura toma forma y se hace real cada 24 horas.', texture: './assets/girardot.jpg', size: 4, isMap: true },
        { id: 'maracay', name: 'Ciudad Maracay', desc: 'La Ciudad Jardín. Cada calle, cada clima y cada lugar que recorro ahora tiene un brillo distinto, porque los transito con la ilusión de saber que estás cerca.', texture: './assets/maracay.jpg', size: 4, isMap: true },
        { id: 'final', name: 'Nuestro Universo', desc: 'De todas las galaxias, constelaciones y lugares en la Tierra, mi lugar favorito es y siempre será exactamente aquí, contigo.', isFinal: true }
    ];

    // --- ANIMACIÓN DE TEXTO ELITE ---
    function animateText(element, text, stagger = 0.04) {
        element.innerHTML = '';
        const words = text.split(' ');
        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.innerHTML = word + '&nbsp;';
            span.className = 'animated-word';
            span.style.animationDelay = `${index * stagger}s`;
            element.appendChild(span);
        });
    }

    // --- SISTEMA NATIVO DE FUEGOS ARTIFICIALES ---
    const fwCanvas = document.getElementById('fireworks-canvas');
    const ctx = fwCanvas.getContext('2d');
    let fwWidth, fwHeight, fireworks = [], particles = [], fwAnimationId;

    function resizeFireworks() {
        fwWidth = window.innerWidth;
        fwHeight = window.innerHeight;
        fwCanvas.width = fwWidth;
        fwCanvas.height = fwHeight;
    }
    window.addEventListener('resize', resizeFireworks);
    resizeFireworks();

    function random(min, max) { return Math.random() * (max - min) + min; }

    class Firework {
        constructor() {
            this.x = random(fwWidth * 0.2, fwWidth * 0.8);
            this.y = fwHeight;
            this.targetY = random(fwHeight * 0.1, fwHeight * 0.4);
            this.speed = random(12, 18);
            this.angle = random(Math.PI * 1.3, Math.PI * 1.7);
            this.vx = Math.cos(this.angle) * this.speed;
            this.vy = Math.sin(this.angle) * this.speed;
            this.color = `hsl(${random(0, 360)}, 100%, 60%)`;
            this.trail = [];
        }
        update() {
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 5) this.trail.shift();
            this.x += this.vx; this.y += this.vy; this.vy += 0.15; 
            return this.vy >= 0 || this.y <= this.targetY;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            const angle = random(0, Math.PI * 2);
            const speed = random(2, 10);
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.decay = random(0.015, 0.03);
        }
        update() {
            this.vx *= 0.95; this.vy *= 0.95; 
            this.vy += 0.2; 
            this.x += this.vx; this.y += this.vy;
            this.alpha -= this.decay;
            return this.alpha <= 0;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function loopFireworks() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
        ctx.fillRect(0, 0, fwWidth, fwHeight);
        
        if (Math.random() < 0.08) fireworks.push(new Firework()); 
        
        for (let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].draw();
            if (fireworks[i].update()) {
                for (let j = 0; j < 60; j++) particles.push(new Particle(fireworks[i].x, fireworks[i].y, fireworks[i].color));
                fireworks.splice(i, 1);
            }
        }
        
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].draw();
            if (particles[i].update()) particles.splice(i, 1);
        }
        
        fwAnimationId = requestAnimationFrame(loopFireworks);
    }

    // 2. CONFIGURACIÓN DEL MOTOR 3D Y CÁMARA
    const canvas = document.getElementById('webgl-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    
    const textureLoader = new THREE.TextureLoader();
    textureLoader.load('./assets/8k_stars_milky_way.jpg', (texture) => {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        texture.colorSpace = THREE.SRGBColorSpace;
        scene.background = texture;
    });

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 20;

    // NAVEGACIÓN 360 TOTALMENTE LIBRE
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 4; // Permite acercarse bastante
    controls.maxDistance = 50;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
    sunLight.position.set(50, 20, 30);
    scene.add(sunLight);

    let currentPlanetMesh = null;
    let currentRingMesh = null;

    // 3. GENERADOR DE GEOMETRÍA
    function loadPlanet(stageIndex) {
        const stage = journeyStages[stageIndex];
        
        if (currentPlanetMesh) {
            scene.remove(currentPlanetMesh);
            currentPlanetMesh.geometry.dispose();
            currentPlanetMesh.material.dispose();
            currentPlanetMesh = null;
        }
        if (currentRingMesh) {
            scene.remove(currentRingMesh);
            currentRingMesh.geometry.dispose();
            currentRingMesh.material.dispose();
            currentRingMesh = null;
        }

        if (stage.isFinal) {
            document.getElementById('controls-container').style.display = 'none';
            controls.enabled = false;
            
            fwCanvas.style.opacity = 1;
            loopFireworks();
            
            // Efecto Morfosis (Completa -> Corazón)
            photoContainer.classList.add('show-full');
            setTimeout(() => {
                photoContainer.classList.add('morph-to-heart');
            }, 3000); 
            return;
        }

        let geometry;
        if (stage.isMap) {
            geometry = new THREE.PlaneGeometry(stage.size * 2.5, stage.size * 1.5);
        } else {
            geometry = new THREE.SphereGeometry(stage.size, 64, 64);
        }

        const texture = textureLoader.load(stage.texture);
        texture.colorSpace = THREE.SRGBColorSpace;

        let material;
        if (stage.isEmissive || stage.isMap) {
            material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
        } else {
            material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.6, metalness: 0.1 });
        }

        currentPlanetMesh = new THREE.Mesh(geometry, material);
        scene.add(currentPlanetMesh);

        if (stage.hasRing) {
            const ringGeometry = new THREE.RingGeometry(stage.size + 1.5, stage.size + 6, 64);
            const ringTexture = textureLoader.load(stage.ringTexture);
            const ringMaterial = new THREE.MeshBasicMaterial({ map: ringTexture, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            currentRingMesh = new THREE.Mesh(ringGeometry, ringMaterial);
            currentRingMesh.rotation.x = Math.PI / 2 + 0.2;
            scene.add(currentRingMesh);
        }

        // Restablecer posición de cámara al cambiar de cuerpo celeste
        camera.position.set(0, 0, stage.size * 3.5);
        camera.lookAt(0, 0, 0); 
        controls.update();
    }

    // --- MÁQUINA DE ESTADOS ELITE (FLUJO DE NAVEGACIÓN) ---
    // 0: Pantalla de Inicio | 1: Viendo Planeta (sin texto) | 2: Viendo Planeta (con texto)
    let systemState = 0; 
    let currentStageIndex = 0;
    
    const nextBtn = document.getElementById('next-btn');
    const introScreen = document.getElementById('intro-screen');
    const textPanel = document.getElementById('text-panel');
    const helperText = document.getElementById('helper-text');
    const audio = document.getElementById('background-audio');
    const titleEl = document.getElementById('stage-title');
    const descEl = document.getElementById('stage-desc');

    nextBtn.addEventListener('click', () => {
        if (audio && audio.paused) audio.play().catch(e => console.log("Audio block"));

        if (systemState === 0) {
            // Salimos del intro -> Mostramos el primer planeta
            introScreen.style.opacity = 0;
            setTimeout(() => introScreen.style.display = 'none', 1000);
            
            helperText.style.display = 'block';
            nextBtn.classList.remove('btn-glow');
            nextBtn.innerText = "Escanear Coordenadas";
            
            loadPlanet(currentStageIndex);
            systemState = 1;
            
        } else if (systemState === 1) {
            // Estamos viendo el planeta -> Mostramos el panel de texto animado
            textPanel.style.opacity = 1;
            
            const currentData = journeyStages[currentStageIndex];
            animateText(titleEl, currentData.name, 0.05); 
            setTimeout(() => animateText(descEl, currentData.desc, 0.02), 300);

            // Cambiamos texto del botón si es el paso justo antes de la foto final
            if (currentStageIndex === journeyStages.length - 2) {
                nextBtn.innerText = "Llegar a Ti ❤️";
            } else {
                nextBtn.innerText = "Siguiente Destino";
            }
            systemState = 2;
            
        } else if (systemState === 2) {
            // Ya leímos el texto -> Viajamos al siguiente planeta
            currentStageIndex++;
            textPanel.style.opacity = 0;
            
            if (currentStageIndex < journeyStages.length - 1) {
                loadPlanet(currentStageIndex);
                nextBtn.innerText = "Escanear Coordenadas";
                systemState = 1;
            } else {
                // FASE FINAL
                loadPlanet(currentStageIndex); 
            }
        }
    });

    // --- ANIMACIÓN CONSTANTE (Bucle) ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Rotación automática (el usuario aún puede moverlo con el mouse por el controls.update())
        if (currentPlanetMesh && !journeyStages[Math.max(0, currentStageIndex)]?.isMap) {
            currentPlanetMesh.rotation.y += 0.002;
        } else if (currentPlanetMesh) {
            currentPlanetMesh.rotation.y += 0.0005; // Mapas rotan un poco más lento
        }
        if (currentRingMesh) {
            currentRingMesh.rotation.z -= 0.0005;
        }
        
        controls.update();
        renderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    </script>
</body>
</html>
